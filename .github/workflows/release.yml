name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY="pi-google-services-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -o "$BINARY" -ldflags="-s -w" .
          gzip -9 -k "$BINARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-google-services-${{ matrix.goos }}-${{ matrix.goarch }}.gz
          path: pi-google-services-${{ matrix.goos }}-${{ matrix.goarch }}.gz

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Move binaries to bin/
        run: |
          mkdir -p bin
          find artifacts/ -name "*.gz" -exec cp {} bin/ \;
          ls -la bin/

      - name: Create npm package
        run: |
          # Copy only what npm needs
          mkdir -p publish
          cp package.json publish/
          cp README.md publish/
          cp SKILL.md publish/
          cp install.js publish/
          cp uninstall.js publish/
          cp -r bin publish/

      - name: Publish to npm
        run: |
          cd publish
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: pi-google-services ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.gz
