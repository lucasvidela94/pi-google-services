name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write  # Required for npm Trusted Publishing (OIDC)

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      # Credentials are NOT in the repo (security). They're stored as a
      # GitHub secret (GOOGLE_OAUTH_CREDENTIALS_JSON) and decoded during CI.
      - name: Write credentials.json
        env:
          CREDS: ${{ secrets.GOOGLE_OAUTH_CREDENTIALS_JSON }}
        run: |
          if [ -n "$CREDS" ]; then
            echo "$CREDS" > credentials.json
          else
            echo "Warning: GOOGLE_OAUTH_CREDENTIALS_JSON not set. Build without embedded credentials."
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY="pi-google-services-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -o "$BINARY" -ldflags="-s -w" .
          gzip -9 -k "$BINARY"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-google-services-${{ matrix.goos }}-${{ matrix.goarch }}.gz
          path: pi-google-services-${{ matrix.goos }}-${{ matrix.goarch }}.gz

  bundle-credentials:
    name: Bundle credentials
    runs-on: ubuntu-latest
    steps:
      - name: Write credentials.json
        env:
          CREDS: ${{ secrets.GOOGLE_OAUTH_CREDENTIALS_JSON }}
        run: |
          if [ -n "$CREDS" ]; then
            echo "$CREDS" > credentials.json
          else
            echo "error: GOOGLE_OAUTH_CREDENTIALS_JSON not set" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: credentials.json
          path: credentials.json

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build, bundle-credentials]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare npm package
        run: |
          mkdir -p publish/bin
          # Binaries
          find artifacts/ -name "*.gz" -exec cp {} publish/bin/ \;
          # Credentials (for install.js to download)
          find artifacts/ -name "credentials.json" -exec cp {} publish/ \;
          # Package files
          cp package.json publish/
          cp README.md publish/
          cp SKILL.md publish/
          cp install.js publish/
          cp uninstall.js publish/

      - name: Publish to npm (OIDC)
        run: |
          cd publish
          npm publish --access public

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, bundle-credentials]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: pi-google-services ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.gz
            artifacts/credentials.json/credentials.json
